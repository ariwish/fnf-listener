name: Build and Release Executables

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller FNF-Listener.spec

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FNF-Listener-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./assets
          # This downloads ALL artifacts into ./assets/
          # Result: ./assets/FNF-Listener-windows-latest/your-app.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # The ** wildcard ensures it finds the files inside the sub-folders
          files: |
            ./assets/FNF-Listener-windows-latest/**
            ./assets/FNF-Listener-ubuntu-latest/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}