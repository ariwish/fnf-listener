name: Build and Release Executables

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller FNF-Listener.spec

      # To keep everything in a folder after unzip, we upload the specific 'dist' subfolder
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FNF-Listener-${{ matrix.os }}
          path: dist/
          # This ensures the folder structure inside 'dist' is preserved

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-temp

      # This step zips each platform folder so they download as single files in the release
      - name: Prepare Assets for Release
        run: |
          mkdir ./assets
          cd ./release-temp
          for dir in */; do
            zip -r "../assets/${dir%/}.zip" "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./assets/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}